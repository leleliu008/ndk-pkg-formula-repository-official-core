summary: Numeric library for complex error functions
git-url: https://jugit.fz-juelich.de/mlz/libcerf
src-url: https://jugit.fz-juelich.de/mlz/libcerf/-/archive/v3.3/libcerf-v3.3.tar.gz
src-sha: ea2910085448e269b5f0f0fabe51ffd846ac68881904be99669d94dc0cc09765
license: MIT

dopatch: |
    gsed -i '/add_subdirectory(testc)/d' CMakeLists.txt
    gsed -i '/^Name: libcerfcpp/,$d' var/libcerf.pc.in

install: cmakew 2 -DPEDANTIC=ON -DWERROR=OFF -DLIB_MAN=OFF -DLIB_RUN=OFF -DCERF_CPP=OFF

# complex.h: double complex cexp(double complex __z) __INTRODUCED_IN(23);
api-min: 23
