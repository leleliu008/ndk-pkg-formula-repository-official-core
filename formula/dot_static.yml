summary: A command-line tool for drawing graphs
web-url: https://www.graphviz.org/
git-url: https://gitlab.com/graphviz/graphviz
src-url: https://gitlab.com/api/v4/projects/4207231/packages/generic/graphviz-releases/14.1.5/graphviz-14.1.5.tar.xz
src-sha: b017378835f7ca12f1a3f1db5c338d7e7af16b284b7007ad73ccec960c1b45b3
license: EPL-1.0
dep-pkg: libgd libpango libglob
dep-upp: libtool gm4 flex bison gawk git python3

prepare: export LDFLAGS="$LDFLAGS --static -static"

install: |
    configure only \
        --disable-swig \
        --disable-php \
        --disable-tcl \
        --without-gdk \
        --without-gtk \
        --without-qt \
        --without-x
    gmakew
    gmakew -C cmd/dot dot_static
    install_bins cmd/dot/dot_static
