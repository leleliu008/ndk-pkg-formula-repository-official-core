summary: Convert text between DOS, UNIX, and Mac formats
web-url: https://waterlander.net/dos2unix/
src-url: https://waterlander.net/dos2unix/files/dos2unix-7.5.6.tar.gz
src-sha: 63650acbd0c7fa8623429bcbf93a888e3351a1cad0f556cf41876f5673dd7d0b
license: BSD-2-Clause
dep-pkg: liblanginfo

install: |
    gmakew clean
    gmakew CC="$CC" CPP="'$CPP'" STRIP="$STRIP" CFLAGS_USER="'$CFLAGS'" LDFLAGS_USER="'$LDFLAGS'" D2U_OS=android ENABLE_NLS=
    gmakew install prefix="$PACKAGE_INSTALL_DIR" ENABLE_NLS=
