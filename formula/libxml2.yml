summary: GNOME XML library
src-url: https://download.gnome.org/sources/libxml2/2.15/libxml2-2.15.3.tar.xz
src-sha: 78262a6e7ac170d6528ebfe2efccdf220191a5af6a6cd61ea4a9a9a5042c7a07
license: MIT
dep-pkg: libiconv libz

install: |
    configure \
        --with-legacy \
        --with-iconv="$libiconv_INSTALL_DIR" \
        --with-http \
        --with-zlib \
        --without-lzma \
        --without-python \
        --without-readline \
        --without-coverage \
        --without-debug \
        --enable-ipv6

dotweak: gsed -i -e '/^Requires/s|$| libiconv|' -e 's|-liconv|-ldl|g' lib/pkgconfig/libxml-2.0.pc
