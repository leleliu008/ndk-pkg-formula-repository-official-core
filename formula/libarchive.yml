summary: Multi-format archive and compression library
git-url: https://github.com/libarchive/libarchive
web-url: https://www.libarchive.org/
src-url: https://www.libarchive.org/downloads/libarchive-3.8.5.tar.xz
src-sha: d68068e74beee3a0ec0dd04aee9037d5757fcc651591a6dcf1b6d542fb15a703
license: BSD-2-Clause
dep-pkg: liblz4 liblzo libzstd liblzma libbz2 libz libiconv libexpat openssl-dev

install: |
    cmakew \
        -DENABLE_TEST=OFF \
        -DENABLE_ACL=ON \
        -DENABLE_XATTR=ON \
        -DENABLE_TAR=OFF \
        -DENABLE_CAT=OFF \
        -DENABLE_CPIO=OFF \
        -DENABLE_UNZIP=OFF \
        -DENABLE_TAR_SHARED=OFF \
        -DENABLE_CAT_SHARED=OFF \
        -DENABLE_CPIO_SHARED=OFF \
        -DENABLE_UNZIP_SHARED=OFF \
        -DENABLE_CNG=OFF \
        -DENABLE_LIBB2=OFF \
        -DENABLE_NETTLE=OFF \
        -DENABLE_MBEDTLS=OFF \
        -DENABLE_LIBXML2=OFF \
        -DENABLE_LZ4=ON \
        -DENABLE_LZO=ON \
        -DENABLE_ZLIB=ON \
        -DENABLE_LZMA=ON \
        -DENABLE_ZSTD=ON \
        -DENABLE_BZip2=ON \
        -DENABLE_ICONV=ON \
        -DENABLE_EXPAT=ON \
        -DENABLE_OPENSSL=ON \
        -DENABLE_INSTALL=ON \
        -DBUILD_SHARED_LIBS=ON
