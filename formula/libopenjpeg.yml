summary: Library for JPEG-2000 image manipulation
web-url: https://www.openjpeg.org/
src-url: https://github.com/uclouvain/openjpeg/archive/refs/tags/v2.5.4.tar.gz
src-sha: a695fbe19c0165f295a8531b1e4e855cd94d0875d2f88ec4b61080677e27188a
license: BSD-2-Clause

dopatch: gsed -i -e '/ftello/d' -e '/fseeko/d' ../include/ndk-pkg-common.h

install: |
    cmakew \
        -DBUILD_DOC=OFF \
        -DBUILD_JAVA=OFF \
        -DBUILD_JPIP=OFF \
        -DBUILD_JPIP_SERVER=OFF \
        -DBUILD_CODEC=OFF \
        -DBUILD_VIEWER=OFF \
        -DBUILD_SHARED_LIBS=ON \
        -DBUILD_STATIC_LIBS=ON \
        -DBUILD_UNIT_TESTS=OFF \
        -DBUILD_LUTS_GENERATOR=OFF \
        -DBUILD_PKGCONFIG_FILES=ON
