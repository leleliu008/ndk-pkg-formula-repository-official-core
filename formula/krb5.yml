pkgtype: lib
summary: Network authentication protocol
web-url: https://web.mit.edu/kerberos
git-url: https://github.com/krb5/krb5
src-url: https://kerberos.org/dist/krb5/1.22/krb5-1.22.2.tar.gz
src-sha: 3243ffbc8ea4d4ac22ddc7dd2a1dc54c57874c40648b60ff97009763554eaf13
dep-upp: gm4 bison perl
dep-pkg: libreadline libopenssl libdb libglob
bscript: src

# https://bugs.launchpad.net/ubuntu/+source/krb5/+bug/2142893
fix-url: https://github.com/krb5/krb5/commit/ad4dcf1856dadc4b352b5c8ff08e51c7290fb41f.patch
fix-sha: de952714a74db2c65618abd0fa0fb70b0a836a2cd3390ac0ff77ecec2d8fd43e
fix-opt: -p2

ccflags: -fcommon

dopatch: |
    gsed -i '/search_paths_first"/d' configure
    gsed -i 's|<db\.h>|<db_185.h>|g' $(grep '<db\.h>' -rl plugins/kdb/db2)

prepare: |
    # int getifaddrs(struct ifaddrs** __list_ptr) __INTRODUCED_IN(24);
    if [ "$TARGET_PLATFORM_VERS" -lt 24 ] ; then
        ac_cv_header_ifaddrs_h=no
    else
        ac_cv_header_ifaddrs_h=yes
    fi

install: |
    configure \
        --enable-dns-for-realm \
        --without-system-verto \
        --with-readline \
        --with-netlib=-lc \
        --with-size-optimizations \
        --with-system-db \
        --enable-static \
        --disable-shared \
        krb5_cv_attr_constructor_destructor='yes,yes' \
        ac_cv_func_regcomp=yes \
        ac_cv_printf_positional=yes \
        ac_cv_lib_readline_main=yes \
        ac_cv_header_ifaddrs_h="$ac_cv_header_ifaddrs_h" LIBS="'-ldb -lncurses'"
