summary: A collections of command-line utilities provided by libxml2
src-url: https://download.gnome.org/sources/libxml2/2.15/libxml2-2.15.3.tar.xz
src-sha: 78262a6e7ac170d6528ebfe2efccdf220191a5af6a6cd61ea4a9a9a5042c7a07
license: MIT
dep-pkg: libiconv libz

install: |
    configure \
        --with-iconv="$libiconv_INSTALL_DIR" \
        --with-zlib \
        --without-lzma \
        --without-python \
        --without-readline \
        --without-coverage \
        --without-debug \
        --enable-ipv6 \
        --enable-static \
        --disable-shared \
        LIBS=-liconv

dotweak: run rm -rf include/ lib/ bin/xml2-config share/aclocal/ share/doc/ share/gtk-doc/ share/man/man1/xml2-config.1
