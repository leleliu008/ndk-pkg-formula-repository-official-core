summary: Linux-native asynchronous I/O access library
web-url: https://pagure.io/libaio
src-url: https://releases.pagure.org/libaio/libaio-0.3.113.tar.gz
src-sha: 2c44d1c5fd0d43752287c9ae1eb9c023f04ef848ea8d4aafa46e9aedb678200b
license: LGPL-2.1-or-later

# on macOS, some fs is non-case-sensitive. In this case, gmake install will always say make: 'install' is up to date.
dopatch: mv -v INSTALL INSTALL.txt

install: |
    gmakew clean
    gmakew default CFLAGS="'$CFLAGS $CPPFLAGS $LDFLAGS -I$PACKAGE_BSCRIPT_DIR/src'" AR="$AR" RANLIB="$RANLIB"
    gmakew install prefix="$PACKAGE_INSTALL_DIR"
