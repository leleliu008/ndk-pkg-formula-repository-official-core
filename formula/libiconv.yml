summary: charset conversion library
src-url: https://ftp.gnu.org/gnu/libiconv/libiconv-1.19.tar.gz
src-sha: 88dd96a8c0464eca144fc791ae60cd31cd8ee78321e67397e25fc095c4a19aa6
license: GPL-3.0-or-later LGPL-2.0-or-later

install: configure --enable-extra-encodings

dotweak: |
    for item in iconv charset
    do
        writepc "lib$item" <<EOF
    prefix=\${pcfiledir}/../..
    exec_prefix=\${prefix}
    libdir=\${exec_prefix}/lib
    includedir=\${prefix}/include

    Name: lib$item
    URL: ${PACKAGE_WEB_URL}
    Description: ${PACKAGE_SUMMARY}
    Version: ${PACKAGE_VERSION}
    Libs: -L\${libdir} -l$item
    Cflags: -I\${includedir}
    EOF
    done
