summary: A free, general-purpose data compression with a high compression ratio
web-url: https://tukaani.org/xz
src-url: https://github.com/tukaani-project/xz/releases/download/v5.8.3/xz-5.8.3.tar.gz
src-sha: 3d3a1b973af218114f4f889bbaa2f4c037deaae0c8e815eec381c3d546b974a0
license: LGPL-2.1-or-later

install: |
    configure \
        --disable-external-sha256 \
        --disable-werror \
        --disable-nls \
        --enable-assembler \
        --enable-threads=posix \
        --disable-xz \
        --disable-xzdec \
        --disable-lzmadec \
        --disable-lzmainfo \
        --disable-lzma-links \
        --disable-scripts
