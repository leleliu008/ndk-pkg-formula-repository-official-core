pkgtype: exe+lib
summary: Tools and libraries to manipulate images in many formats
web-url: https://imagemagick.org/
src-url: https://github.com/ImageMagick/ImageMagick/releases/download/7.1.2-26/ImageMagick-7.1.2-26.7z
src-sha: 87aceeed7448836b0f729eddca6d7c5bad8b8e95c043cb6b1b2f72247189edcf
version: 7.1.2.26
license: ImageMagick
dep-pkg: ghostscript libheif liblqr libltdl

dopatch: gsed -i -e '/ftello/d' -e '/fseeko/d' ../include/ndk-pkg-common.h

install: |
    configure \
        --with-freetype=yes \
        --with-gvc=no \
        --with-modules \
        --with-openjp2 \
        --with-openexr \
        --with-webp=yes \
        --with-heic=yes \
        --with-gslib \
        --with-pango \
        --with-lqr \
        --without-x \
        --without-wmf \
        --without-fftw \
        --disable-opencl LIBS=-lc++

dotweak: gsed -i 's|-lm|-lomp|' lib/pkgconfig/ImageMagick.pc
